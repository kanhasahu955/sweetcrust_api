# HTTP-only bootstrap — used until Let's Encrypt certs exist.
# Swap to nginx.prod.conf after: ./deploy/hostinger/issue-cert.sh
# Docker DNS + variables so nginx starts even if realtime is briefly down.

server {
    listen 80;
    server_name api.skbakery.in api.bakerywala.cloud;

    resolver 127.0.0.11 valid=10s ipv6=off;
    client_max_body_size 25m;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location /socket.io/ {
        set $upstream_realtime realtime:8081;
        proxy_pass http://$upstream_realtime;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    location = /gateway/health {
        set $upstream_gateway gateway:8080;
        proxy_pass http://$upstream_gateway/gateway/health;
    }

    location / {
        set $upstream_gateway gateway:8080;
        proxy_pass http://$upstream_gateway;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
