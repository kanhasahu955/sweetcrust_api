# Production TLS for api.bakerywala.cloud
# Requires certs at /etc/letsencrypt/live/api.bakerywala.cloud/ (see deploy/hostinger/issue-cert.sh)

upstream gateway {
    server gateway:8080;
}

upstream realtime {
    server realtime:8081;
}

server {
    listen 80;
    server_name api.bakerywala.cloud;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name api.bakerywala.cloud;

    ssl_certificate     /etc/letsencrypt/live/api.bakerywala.cloud/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.bakerywala.cloud/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    # HSTS (enable once HTTPS is confirmed stable)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    client_max_body_size 25m;

    location /socket.io/ {
        proxy_pass http://realtime;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 86400;
    }

    location = /gateway/health {
        proxy_pass http://gateway/gateway/health;
    }

    location / {
        proxy_pass http://gateway;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}
