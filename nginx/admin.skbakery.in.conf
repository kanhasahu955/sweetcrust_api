# Admin Nuxt app — container "admin" on backend_v2_sweetcrust network
# Included after api server blocks in nginx.prod.with-admin.conf

server {
    listen 80;
    server_name admin.skbakery.in;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    http2 on;
    server_name admin.skbakery.in;

    resolver 127.0.0.11 valid=10s ipv6=off;

    ssl_certificate     /etc/letsencrypt/live/admin.skbakery.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/admin.skbakery.in/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    client_max_body_size 25m;

    location / {
        set $upstream_admin admin:3000;
        proxy_pass http://$upstream_admin;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 120s;
    }
}
