# Deploy backend_v2 → Hostinger VPS
# Env is built in GitHub from secrets/vars (no Mac .env file).

name: Deploy

on:
  push:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      skip_build:
        description: "Skip --build (faster restart only)"
        type: boolean
        default: false

concurrency:
  group: hostinger-backend-v2
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy to Hostinger VPS
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install rsync
        run: sudo apt-get update -y && sudo apt-get install -y rsync

      - name: Configure SSH
        env:
          HOSTINGER_SSH_KEY: ${{ secrets.HOSTINGER_SSH_KEY }}
          HOSTINGER_HOST: ${{ secrets.HOSTINGER_HOST }}
          HOSTINGER_USER: ${{ secrets.HOSTINGER_USER }}
          HOSTINGER_SSH_PORT: ${{ secrets.HOSTINGER_SSH_PORT }}
        run: |
          set -euo pipefail
          test -n "${HOSTINGER_SSH_KEY:-}" || { echo "Missing secret HOSTINGER_SSH_KEY"; exit 1; }
          test -n "${HOSTINGER_HOST:-}" || { echo "Missing secret HOSTINGER_HOST"; exit 1; }
          test -n "${HOSTINGER_USER:-}" || { echo "Missing secret HOSTINGER_USER"; exit 1; }
          PORT="${HOSTINGER_SSH_PORT:-22}"
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$HOSTINGER_SSH_KEY" > ~/.ssh/hostinger_deploy
          chmod 600 ~/.ssh/hostinger_deploy
          ssh-keyscan -p "$PORT" -H "$HOSTINGER_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true
          cat > ~/.ssh/config <<EOF
          Host hostinger-vps
            HostName ${HOSTINGER_HOST}
            User ${HOSTINGER_USER}
            Port ${PORT}
            IdentityFile ~/.ssh/hostinger_deploy
            IdentitiesOnly yes
            StrictHostKeyChecking accept-new
          EOF
          chmod 600 ~/.ssh/config

      - name: Smoke SSH
        run: |
          set -euo pipefail
          # Fail fast with a clear hint (wrong key vs network)
          if ! ssh -o ConnectTimeout=15 -o BatchMode=yes hostinger-vps 'uname -a'; then
            echo "::error::SSH failed. On VPS Terminal run: mkdir -p /root/.ssh && echo YOUR_hostinger_gha.pub >> /root/.ssh/authorized_keys && chmod 600 /root/.ssh/authorized_keys && systemctl enable --now ssh"
            echo "::error::Confirm GitHub secret HOSTINGER_SSH_KEY is the private key that matches the public key on the VPS."
            exit 1
          fi


      - name: Build .env.production from GitHub secrets
        env:
          # Required
          MYSQL_ROOT_PASSWORD: ${{ secrets.MYSQL_ROOT_PASSWORD }}
          MYSQL_PASSWORD: ${{ secrets.MYSQL_PASSWORD }}
          JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY }}
          CERTBOT_EMAIL: ${{ secrets.CERTBOT_EMAIL }}
          # Optional product keys
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          RAZORPAY_KEY_ID: ${{ secrets.RAZORPAY_KEY_ID }}
          RAZORPAY_KEY_SECRET: ${{ secrets.RAZORPAY_KEY_SECRET }}
          RAZORPAY_WEBHOOK_SECRET: ${{ secrets.RAZORPAY_WEBHOOK_SECRET }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
          IMAGEKIT_PUBLIC_KEY: ${{ secrets.IMAGEKIT_PUBLIC_KEY }}
          IMAGEKIT_PRIVATE_KEY: ${{ secrets.IMAGEKIT_PRIVATE_KEY }}
          IMAGEKIT_URL_ENDPOINT: ${{ secrets.IMAGEKIT_URL_ENDPOINT }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          MSG91_AUTH_KEY: ${{ secrets.MSG91_AUTH_KEY }}
          MSG91_TEMPLATE_ID: ${{ secrets.MSG91_TEMPLATE_ID }}
          # Non-secret overrides (Settings → Variables)
          CORS_ORIGINS: ${{ vars.CORS_ORIGINS }}
          AUTH_PUBLIC_BASE_URL: ${{ vars.AUTH_PUBLIC_BASE_URL }}
          API_DOMAIN: ${{ vars.API_DOMAIN }}
          BAKERY_NAME: ${{ vars.BAKERY_NAME }}
          BAKERY_PHONE: ${{ vars.BAKERY_PHONE }}
          BAKERY_UPI_ID: ${{ vars.BAKERY_UPI_ID }}
          CERTBOT_EMAIL_VAR: ${{ vars.CERTBOT_EMAIL }}
        run: |
          set -euo pipefail
          # Allow CERTBOT_EMAIL from Variables if secret empty
          if [[ -z "${CERTBOT_EMAIL:-}" && -n "${CERTBOT_EMAIL_VAR:-}" ]]; then
            export CERTBOT_EMAIL="$CERTBOT_EMAIL_VAR"
          fi
          chmod +x deploy/hostinger/render-env.sh
          ./deploy/hostinger/render-env.sh

      - name: Deploy
        env:
          DEPLOY_HOST: hostinger-vps
          DEPLOY_USER: ${{ secrets.HOSTINGER_USER }}
          DEPLOY_PATH: /opt/sweetcrust/backend_v2
          SKIP_BUILD: ${{ inputs.skip_build && '1' || '0' }}
        run: |
          chmod +x deploy/hostinger/*.sh
          ./deploy/hostinger/deploy.sh --ci

      - name: Health check
        run: |
          set -euo pipefail
          HOST="${{ secrets.HOSTINGER_HOST }}"
          for i in $(seq 1 30); do
            if curl -fsS --max-time 5 "http://${HOST}/gateway/health" >/dev/null; then
              curl -fsS "http://${HOST}/gateway/health"
              echo
              exit 0
            fi
            sleep 4
          done
          echo "Health check failed" >&2
          ssh hostinger-vps 'cd /opt/sweetcrust/backend_v2 && docker compose -f docker-compose.prod.yml --env-file .env.production ps'
          exit 1
