# SweetCrust microservices — apps → nginx → Fastify gateway → FastAPI services
# Credentials: backend_v2/.env only (independent of legacy backend/).
#
#   docker compose up -d --build
#   curl http://127.0.0.1/gateway/health

services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"

  auth:
    build:
      context: .
      dockerfile: services/auth_service/Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      REDIS_URL: redis://redis:6379/0
      PORT: "8001"
      SERVICE_PORT: "8001"
    ports: ["8001:8001"]
    depends_on:
      - redis

